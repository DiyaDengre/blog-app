<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Blog Dashboard</title>

    <!-- Your CSS -->
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>📘 Blog Dashboard</h2>
        <a href="/create">+ New Post</a>
    </div>

    <!-- Action Section -->
    <div class="action-box">
        <h3>Update or Delete a Post</h3>

        <form method = "get" class="actions">
            <input type="number" name="id" placeholder="Enter Post ID" required>

            <!-- Edit button -->
            <button type="submit" formaction="/edit" class="edit-btn">
                Edit
            </button>

            <!-- Delete button -->
            <button type="submit" formaction="/delete" class="delete-btn">
                Delete
            </button>
        </form>
    </div>
    <!-- Table -->
    <div class="table-container">
        <table border="1">
            <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Content</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.title}"></td>
                <td th:text="${post.author}"></td>
                <td th:text="${post.content}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
